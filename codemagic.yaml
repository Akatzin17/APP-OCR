workflows:
  default-workflow:
    name: Flujo de trabajo predeterminado
    max_build_duration: 60
    instance_type: mac_mini
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events: []
    scripts:
      - name: Configurar CocoaPods y evitar congelamiento
        script: |
          pod repo remove master || true
          echo "source 'https://cdn.cocoapods.org/'" > ios/Podfile.tmp
          cat ios/Podfile >> ios/Podfile.tmp
          mv ios/Podfile.tmp ios/Podfile
      - name: Instalar dependencias nativas (Pod install)
        script: |
          cd ios && pod install --repo-update && cd ..
      - name: Compilar Flutter para iOS (Debug)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
