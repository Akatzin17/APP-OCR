workflows:
  default-workflow:
    name: Flujo de trabajo predeterminado
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events: []
    scripts:
      - name: Obtener dependencias y autogenerar archivos de entorno iOS
        script: |
          flutter clean
          flutter pub get
          
          # Creamos la carpeta de destino
          mkdir -p ios/Flutter
          
          # TRUCO MAESTRO: Escribimos un comentario básico en los archivos temporales 
          # para que Ruby/CocoaPods los acepte y no los trate como archivos corruptos.
          echo "# Placeholder" > ios/Flutter/flutter_export_environment.sh
          echo "FLUTTER_ROOT=." > ios/Flutter/generated_xcode_build_settings.mgmt
          
          # Ahora Flutter actualizará estos archivos con las rutas reales de macOS
          flutter build ios --config-only --debug --no-codesign
      - name: Instalar dependencias nativas (Pod install)
        script: |
          export COCOAPODS_DISABLE_STATS=true
          cd ios
          pod repo remove master || true
          pod install --repo-update
          cd ..
      - name: Compilar Flutter para iOS (Debug)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
