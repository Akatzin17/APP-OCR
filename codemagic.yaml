workflows:
  default-workflow:
    name: Flujo de trabajo predeterminado
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events: []
    scripts:
      - name: Instalar dependencias nativas (Pod install)
        script: |
          # Activamos el uso de CDN de forma global para CocoaPods sin alterar el Podfile
          export COCOAPODS_DISABLE_STATS=true
          
          cd ios
          pod repo remove master || true
          pod install --repo-update
          cd ..
      - name: Compilar Flutter para iOS (Debug)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
