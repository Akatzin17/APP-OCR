workflows:
  default-workflow:
    name: Flujo de trabajo predeterminado
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events: []
    scripts:
      - name: Obtener dependencias y autogenerar archivos de entorno iOS
        script: |
          flutter pub get
          # Este comando genera los scripts de entorno nativos (como flutter_export_environment.sh) en el servidor
          flutter build ios --config-only
      - name: Instalar dependencias nativas (Pod install)
        script: |
          export COCOAPODS_DISABLE_STATS=true
          cd ios
          pod repo remove master || true
          pod install --repo-update
          cd ..
      - name: Compilar Flutter para iOS (Debug)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
