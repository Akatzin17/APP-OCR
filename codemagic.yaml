workflows:
  default-workflow:
    name: Flujo de trabajo predeterminado
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events: []
    scripts:
      - name: Obtener dependencias y autogenerar archivos de entorno iOS
        script: |
          # 1. Limpieza y dependencias de Flutter
          flutter clean
          flutter pub get
          
          # 2. Creamos la carpeta físicamente en la Mac de Codemagic
          mkdir -p ios/Flutter
          
          # 3. Escribimos código real de Bash dentro de los archivos para que NO estén vacíos
          # y CocoaPods los pueda importar sin mandar errores de archivo corrupto o ausente.
          echo "#!/bin/sh" > ios/Flutter/flutter_export_environment.sh
          echo "export \"FLUTTER_ROOT=.\"" >> ios/Flutter/flutter_export_environment.sh
          
          echo "FLUTTER_ROOT=." > ios/Flutter/generated_xcode_build_settings.mgmt
          
          # 4. Ahora sí, autogeneramos las configuraciones reales sobreescribiendo los placeholders
          flutter build ios --config-only --debug --no-codesign
      - name: Instalar dependencias nativas (Pod install)
        script: |
          export COCOAPODS_DISABLE_STATS=true
          cd ios
          pod repo remove master || true
          pod install --repo-update
          cd ..
      - name: Compilar Flutter para iOS (Debug)
        script: |
          flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
